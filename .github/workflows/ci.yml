name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: apt deps (host linux build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libxcb-shm0-dev \
            libxcb-randr0-dev libxdo-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p rohomieo-proto -p rohomieo-signaling -- -D warnings
      - run: cargo test -p rohomieo-proto -p rohomieo-signaling
      - run: cargo check -p rohomieo-host

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: python3 scripts/gen-icons.py
        working-directory: web
      - run: npm run build
        working-directory: web
